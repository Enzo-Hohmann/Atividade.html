
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário de Cadastro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Cadastro de Usuário</h2>

<form action="enviar.php" method="post" enctype="multipart/form-data">

<label>Nome:</label><br>
<input type="text" name="nome" placeholder="Digite seu nome" required><br><br>

<label>Email:</label><br>
<input type="email" name="email" placeholder="Digite seu email" required><br><br>

<label>Senha:</label><br>
<input type="password" name="senha" placeholder="Digite sua senha" required><br><br>

<label>Idade:</label><br>
<input type="number" name="idade" placeholder="Ex: 18"><br><br>

<label>Telefone:</label><br>
<input type="tel" name="telefone" placeholder="(00) 00000-0000"><br><br>

<label>Data de nascimento:</label><br>
<input type="date" name="data"><br><br>

<label>Sexo:</label><br>
<input type="radio" name="sexo" value="masculino" required> Masculino
<input type="radio" name="sexo" value="feminino"> Feminino
<input type="radio" name="sexo" value="outro"> Outro<br><br>

<label>Interesses:</label><br>
<input type="checkbox" name="interesses[]" value="esporte"> Esporte
<input type="checkbox" name="interesses[]" value="musica"> Música
<input type="checkbox" name="interesses[]" value="jogos"> Jogos
<input type="checkbox" name="interesses[]" value="filmes"> Filmes<br><br>

<label>Estado:</label><br>
<select name="estado">
<option value="">Selecione seu estado</option>
<option value="SC">SC</option>
<option value="PR">PR</option>
<option value="RS">RS</option>
<option value="SP">SP</option>
</select><br><br>

<label>Curso:</label><br>
<select name="curso">
<option value="">Selecione um curso</option>
<option value="informatica">Informática</option>
<option value="administracao">Administração</option>
<option value="engenharia">Engenharia</option>
</select><br><br>

<label>Mensagem:</label><br>
<textarea name="msg" placeholder="Escreva algo..."></textarea><br><br>

<label>Enviar arquivo:</label><br>
<input type="file" name="arquivo"><br><br>

<input type="submit" value="Enviar">
<input type="reset" value="Limpar">

</form>

</body>
</html>
