<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form method="POST" class="container">

        <h1>Cadastro de Usuário</h1>

        <fieldset>
            <legend>Dados pessoais</legend>

            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>

            <label for="data">Data de nascimento:</label>
            <input type="date" id="data" name="data">
        </fieldset>

        <!-- Informações adicionais -->
        <fieldset>
            <legend>Informações adicionais</legend>

            <label>Gênero:</label>
            <div class="inline">
                <input type="radio" name="genero" value="masculino"> Masculino
                <input type="radio" name="genero" value="feminino"> Feminino
                <input type="radio" name="genero" value="outro"> Outro
            </div>

            <label>Interesses:</label>
            <div class="inline">
                <input type="checkbox" name="interesses" value="tecnologia"> Tecnologia
                <input type="checkbox" name="interesses" value="esportes"> Esportes
                <input type="checkbox" name="interesses" value="musica"> Música
                <input type="checkbox" name="interesses" value="jogos"> Jogos
            </div>

            <label for="pais">País:</label>
            <select id="pais" name="pais">
                <option>Brasil</option>
                <option>Argentina</option>
                <option>Estados Unidos</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Outros campos</legend>

            <label for="foto">Foto de perfil:</label>
            <input type="file" id="foto" name="foto">

            <label for="cor">Cor favorita:</label>
            <input type="color" id="cor" name="cor">

            <label for="nivel">Nível de satisfação:</label>
            <input type="range" id="nivel" name="nivel" min="0" max="10">
        </fieldset>


        <fieldset>
            <legend>Mensagem</legend>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem"></textarea>
        </fieldset>

        <div class="botoes">
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </div>

    </form>

</body>
</html>
